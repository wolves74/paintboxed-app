<script>
/* =========================
   10-COLOR EXPANSION RESET
   TOP-ROW ANTI-REPEAT FIX
   ========================= */

function topRowTooSimilar(a, b) {
  const hd = hueDistance(a.h, b.h);
  const ld = Math.abs(a.l - b.l);
  const sd = Math.abs(a.s - b.s);

  return (
    (hd < 22 && ld < 16) ||
    (hueFamily(a.h) === hueFamily(b.h) && ld < 18) ||
    (broadColorBucket(a) === broadColorBucket(b) && ld < 18 && sd < 18)
  );
}

function tempNeedForExpandedPalette(existing) {
  let warm = 0;
  let cool = 0;

  existing.forEach(c => {
    if (isWarmHue(c.h) || c.h <= 72) warm++;
    if (isCoolHue(c.h) || (c.h >= 80 && c.h <= 170)) cool++;
  });

  if (cool > warm) return "warm";
  if (warm > cool) return "cool";
  return "either";
}

function neutralForExpanded(vibe, existing, core) {
  const need = tempNeedForExpandedPalette(existing);
  const paletteForNeed = core && core.length >= 5
    ? core.map(copyColor)
    : existing.slice(0, 5).map(copyColor);

  const candidates = [];

  for (let i = 0; i < 12; i++) {
    candidates.push(neutralBridgeForVibe(vibe, paletteForNeed));
  }

  if (need === "warm" || need === "either") {
    candidates.push(
      softenColor(makeColor({ h1: 18, h2: 34, s1: 10, s2: 26, l1: 54, l2: 76 }), vibe),
      softenColor(makeColor({ h1: 30, h2: 48, s1: 10, s2: 24, l1: 52, l2: 74 }), vibe),
      softenColor(makeColor({ h1: 340, h2: 10, s1: 8, s2: 22, l1: 54, l2: 74 }), vibe)
    );
  }

  if (need === "cool" || need === "either") {
    candidates.push(
      softenColor(makeColor({ h1: 75, h2: 115, s1: 4, s2: 15, l1: 48, l2: 72 }), vibe),
      softenColor(makeColor({ h1: 195, h2: 230, s1: 4, s2: 16, l1: 48, l2: 72 }), vibe),
      softenColor(makeColor({ h1: 225, h2: 255, s1: 4, s2: 16, l1: 48, l2: 72 }), vibe),
      softenColor(makeColor({ h1: 280, h2: 318, s1: 4, s2: 16, l1: 48, l2: 72 }), vibe)
    );
  }

  return chooseExpandedCandidate(candidates, existing, vibe, "neutral");
}

function warmNudeNeutralForExpanded(vibe, existing) {
  const warmNudeRanges = {
    playful: [
      { h1: 14, h2: 28, s1: 12, s2: 26, l1: 62, l2: 78 },
      { h1: 24, h2: 38, s1: 10, s2: 24, l1: 58, l2: 74 },
      { h1: 340, h2: 8, s1: 10, s2: 24, l1: 60, l2: 76 },
      { h1: 32, h2: 48, s1: 10, s2: 22, l1: 60, l2: 76 },
      { h1: 8, h2: 20, s1: 10, s2: 22, l1: 60, l2: 74 }
    ],
    cozy: [
      { h1: 18, h2: 32, s1: 8, s2: 20, l1: 58, l2: 76 },
      { h1: 26, h2: 42, s1: 8, s2: 20, l1: 54, l2: 72 },
      { h1: 340, h2: 8, s1: 7, s2: 18, l1: 56, l2: 74 },
      { h1: 36, h2: 52, s1: 8, s2: 20, l1: 56, l2: 74 }
    ],
    moody: [
      { h1: 18, h2: 34, s1: 6, s2: 16, l1: 44, l2: 62 },
      { h1: 340, h2: 8, s1: 6, s2: 16, l1: 44, l2: 62 },
      { h1: 28, h2: 44, s1: 6, s2: 16, l1: 42, l2: 60 }
    ],
    nature: [
      { h1: 20, h2: 36, s1: 8, s2: 20, l1: 52, l2: 70 },
      { h1: 32, h2: 50, s1: 8, s2: 20, l1: 52, l2: 72 },
      { h1: 340, h2: 8, s1: 7, s2: 18, l1: 52, l2: 70 }
    ],
    coastal: [
      { h1: 18, h2: 32, s1: 8, s2: 20, l1: 62, l2: 80 },
      { h1: 26, h2: 42, s1: 7, s2: 18, l1: 60, l2: 78 },
      { h1: 340, h2: 8, s1: 6, s2: 16, l1: 62, l2: 80 }
    ],
    vintage: [
      { h1: 18, h2: 34, s1: 8, s2: 20, l1: 54, l2: 74 },
      { h1: 28, h2: 46, s1: 8, s2: 22, l1: 54, l2: 74 },
      { h1: 340, h2: 8, s1: 8, s2: 20, l1: 54, l2: 72 },
      { h1: 36, h2: 54, s1: 9, s2: 22, l1: 54, l2: 74 }
    ]
  };

  const ranges = warmNudeRanges[vibe] || warmNudeRanges.cozy;
  const candidates = [];

  for (let i = 0; i < 40; i++) {
    candidates.push(softenColor(makeColor(pick(ranges)), vibe));
  }

  return chooseExpandedCandidate(candidates, existing, vibe, "neutralSupport");
}

function hasWarmNudeNeutral(palette) {
  return palette.some(c =>
    isWarmNeutral(c) &&
    c.l >= 44 &&
    c.l <= 82 &&
    c.s >= 5 &&
    c.s <= 30
  );
}

function countWarmNudeNeutrals(palette) {
  return palette.filter(c =>
    isWarmNeutral(c) &&
    c.l >= 44 &&
    c.l <= 82 &&
    c.s >= 5 &&
    c.s <= 30
  ).length;
}

function expandedPairPenalty(candidate, existing) {
  let penalty = 0;

  existing.forEach(other => {
    const hd = hueDistance(candidate.h, other.h);
    const ld = Math.abs(candidate.l - other.l);
    const sd = Math.abs(candidate.s - other.s);
    const dist = hd * 0.75 + ld * 1.1 + sd * 0.5;

    if (dist < 24) penalty += 500;
    if (hd < 14 && ld < 18) penalty += 260;
    if (hd < 20 && ld < 12) penalty += 260;
    if (hueFamily(candidate.h) === hueFamily(other.h) && ld < 22) penalty += 220;
    if (broadColorBucket(candidate) === broadColorBucket(other) && ld < 14 && sd < 16) penalty += 190;
  });

  return penalty;
}

function chooseExpandedCandidate(candidates, existing, vibe, role) {
  let best = null;
  let bestScore = -999999;

  candidates.forEach(raw => {
    const c = copyColor(softenColor(raw, vibe));
    let score = 0;

    existing.forEach(other => {
      score += Math.min(hueDistance(c.h, other.h), 90) * 0.7;
      score += Math.min(Math.abs(c.l - other.l), 42) * 1.35;
      score += Math.min(Math.abs(c.s - other.s), 34) * 0.4;
    });

    score -= expandedPairPenalty(c, existing);

    const familyCount = existing.filter(e => hueFamily(e.h) === hueFamily(c.h)).length;
    const bucketCount = existing.filter(e => broadColorBucket(e) === broadColorBucket(c)).length;

    score -= familyCount * 95;
    score -= bucketCount * 60;

    if (role === "light") {
      if (c.l >= 76 && c.l <= 94) score += 80;
      if (c.l < 70) score -= 120;
    }

    if (role === "softTint") {
      if (c.l >= 78 && c.l <= 92) score += 130;
      if (c.s >= 4 && c.s <= 24) score += 95;
      if (c.l < 75) score -= 220;
      if (c.s > 28) score -= 170;
    }

    if (role === "neutral" || role === "neutralBridge") {
      if (isNeutralish(c)) score += 110;
      if (c.s > 32) score -= 180;
      if (c.l < 46 || c.l > 80) score -= 170;

      if (role === "neutralBridge") {
        if (c.l >= 52 && c.l <= 74) score += 90;
      }
    }

    if (role === "neutralSupport") {
      if (isWarmNeutral(c)) score += 130;
      if (c.l >= 52 && c.l <= 76) score += 80;
      if (c.s >= 6 && c.s <= 24) score += 60;
      if (c.s > 28) score -= 120;
    }

    if (role === "warm") {
      if (isWarmHue(c.h) || c.h <= 72) score += 100;
      if (c.l >= 38 && c.l <= 74) score += 35;
    }

    if (role === "cool") {
      if (isCoolHue(c.h) || (c.h >= 80 && c.h <= 170)) score += 100;
      if (c.l >= 38 && c.l <= 74) score += 35;
    }

    if (role === "bridgeAccent") {
      if (c.l >= 36 && c.l <= 72) score += 45;
      if (c.s >= 8 && c.s <= (vibe === "playful" ? 64 : 44)) score += 35;
    }

    if (role === "dark") {
      if (c.l >= 10 && c.l <= 36) score += 80;
      if (c.l > 44) score -= 150;
    }

    if (score > bestScore) {
      best = c;
      bestScore = score;
    }
  });

  return best || copyColor(candidates[0]);
}

function makeSoftTintExpansion(vibe, core, existing) {
  const [light, bridge, accent, balance] = core;
  const bridgeWarm = isWarmNeutral(bridge) || ((isWarmHue(bridge.h) || bridge.h <= 72) && bridge.s <= 30);

  const candidates = [
    tuneColor(light, vibe, 0, -6, -3),
    tuneColor(mixHsl(light, bridge, 0.12), vibe, 0, -8, -4),
    tuneColor(mixHsl(light, accent, 0.14), vibe, 0, -10, -3),
    tuneColor(mixHsl(light, balance, 0.14), vibe, 0, -10, -3)
  ];

  if (bridgeWarm) {
    candidates.push(
      softenColor(makeColor({ h1: 190, h2: 225, s1: 4, s2: 14, l1: 80, l2: 92 }), vibe),
      softenColor(makeColor({ h1: 80, h2: 110, s1: 4, s2: 14, l1: 80, l2: 92 }), vibe),
      softenColor(makeColor({ h1: 265, h2: 310, s1: 4, s2: 14, l1: 80, l2: 92 }), vibe),
      softenColor(makeColor({ h1: 0, h2: 360, s1: 0, s2: 8, l1: 82, l2: 93 }), vibe)
    );
  } else {
    candidates.push(
      softenColor(makeColor({ h1: 16, h2: 30, s1: 6, s2: 16, l1: 80, l2: 92 }), vibe),
      softenColor(makeColor({ h1: 30, h2: 46, s1: 6, s2: 16, l1: 80, l2: 92 }), vibe),
      softenColor(makeColor({ h1: 340, h2: 8, s1: 6, s2: 16, l1: 80, l2: 92 }), vibe),
      softenColor(makeColor({ h1: 40, h2: 54, s1: 4, s2: 14, l1: 82, l2: 93 }), vibe)
    );
  }

  for (let i = 0; i < 10; i++) {
    candidates.push(
      randomFromVibe(vibe, ["light", "support"], c =>
        c.l >= 78 && c.l <= 94 && c.s <= 28
      )
    );
  }

  return chooseExpandedCandidate(candidates, existing.concat([bridge]), vibe, "softTint");
}

function makeDistinctNeutralBridge(vibe, core, existing, softTint) {
  const [light, bridge, accent, balance] = core;
  const softWarm = isWarmNeutral(softTint) || ((isWarmHue(softTint.h) || softTint.h <= 72) && softTint.s <= 28);

  const candidates = [
    copyColor(bridge),
    tuneColor(bridge, vibe, 0, -4, 0),
    tuneColor(bridge, vibe, 8, -6, 3),
    tuneColor(bridge, vibe, -8, -6, 3)
  ];

  for (let i = 0; i < 18; i++) {
    candidates.push(neutralBridgeForVibe(vibe, [light, softTint, accent, balance]));
  }

  if (softWarm) {
    candidates.push(
      softenColor(makeColor({ h1: 78, h2: 110, s1: 4, s2: 14, l1: 52, l2: 72 }), vibe),
      softenColor(makeColor({ h1: 190, h2: 225, s1: 4, s2: 14, l1: 52, l2: 72 }), vibe),
      softenColor(makeColor({ h1: 225, h2: 252, s1: 4, s2: 14, l1: 50, l2: 70 }), vibe),
      softenColor(makeColor({ h1: 280, h2: 315, s1: 4, s2: 14, l1: 52, l2: 72 }), vibe),
      softenColor(makeColor({ h1: 0, h2: 360, s1: 0, s2: 8, l1: 50, l2: 68 }), vibe)
    );
  } else {
    candidates.push(
      softenColor(makeColor({ h1: 16, h2: 30, s1: 8, s2: 20, l1: 54, l2: 74 }), vibe),
      softenColor(makeColor({ h1: 26, h2: 42, s1: 8, s2: 20, l1: 54, l2: 74 }), vibe),
      softenColor(makeColor({ h1: 340, h2: 8, s1: 8, s2: 18, l1: 54, l2: 72 }), vibe),
      softenColor(makeColor({ h1: 34, h2: 52, s1: 8, s2: 20, l1: 54, l2: 74 }), vibe)
    );
  }

  return chooseExpandedCandidate(candidates, existing.concat([softTint]), vibe, "neutralBridge");
}

function makeLightExpansion(vibe, core, existing) {
  const [light, bridge] = core;
  const candidates = [
    tuneColor(light, vibe, 10, 3, -8),
    tuneColor(light, vibe, -14, 4, -10),
    tuneColor(mixHsl(light, bridge, 0.2), vibe, 8, -2, -4),
    tuneColor(mixHsl(light, bridge, 0.35), vibe, -10, -4, 2)
  ];

  for (let i = 0; i < 8; i++) {
    candidates.push(randomFromVibe(vibe, ["light"], c => c.l >= 78));
  }

  return chooseExpandedCandidate(candidates, existing, vibe, "light");
}

function makeWarmExpansion(vibe, core, existing) {
  const [, bridge, accent, balance] = core;
  const candidates = [
    tuneColor(accent, vibe, 14, -8, 7),
    tuneColor(accent, vibe, -18, -10, 3),
    tuneColor(bridge, vibe, 18, 5, -8),
    tuneColor(mixHsl(accent, bridge, 0.28), vibe, 0, -4, 0),
    tuneColor(mixHsl(balance, accent, 0.4), vibe, 18, -4, 2)
  ];

  for (let i = 0; i < 14; i++) {
    candidates.push(randomFromVibe(vibe, ["support", "accent", "balance"], c =>
      (isWarmHue(c.h) || c.h <= 72) && c.l >= 36 && c.l <= 76
    ));
  }

  return chooseExpandedCandidate(candidates, existing, vibe, "warm");
}

function makeCoolExpansion(vibe, core, existing) {
  const [, bridge, accent, balance] = core;
  const candidates = [
    tuneColor(balance, vibe, -16, -4, 5),
    tuneColor(balance, vibe, 20, -6, 3),
    tuneColor(accent, vibe, 35, -10, 5),
    tuneColor(mixHsl(balance, bridge, 0.25), vibe, 0, -4, 0),
    tuneColor(mixHsl(balance, accent, 0.4), vibe, -20, -6, 4)
  ];

  for (let i = 0; i < 14; i++) {
    candidates.push(randomFromVibe(vibe, ["support", "accent", "balance"], c =>
      (isCoolHue(c.h) || (c.h >= 80 && c.h <= 170)) && c.l >= 34 && c.l <= 76
    ));
  }

  return chooseExpandedCandidate(candidates, existing, vibe, "cool");
}

function makeBridgeAccent(vibe, core, existing) {
  const [, bridge, accent, balance] = core;
  const candidates = [
    tuneColor(mixHsl(accent, balance, 0.5), vibe, 0, -8, 2),
    tuneColor(mixHsl(bridge, balance, 0.45), vibe, 0, -4, -2),
    tuneColor(balance, vibe, 32, -8, 4),
    tuneColor(accent, vibe, -32, -8, 4)
  ];

  for (let i = 0; i < 16; i++) {
    candidates.push(randomFromVibe(vibe, ["accent", "balance", "support"], c =>
      c.l >= 34 && c.l <= 76
    ));
  }

  return chooseExpandedCandidate(candidates, existing, vibe, "bridgeAccent");
}

function makeDarkExpansion(vibe, core, existing) {
  const [, , accent, balance, dark] = core;
  const candidates = [
    tuneColor(dark, vibe, 16, -2, 12),
    tuneColor(dark, vibe, -18, 2, 12),
    tuneColor(mixHsl(dark, accent, 0.16), vibe, 0, 0, 8),
    tuneColor(mixHsl(dark, balance, 0.18), vibe, 0, 0, 10)
  ];

  for (let i = 0; i < 12; i++) {
    candidates.push(randomFromVibe(vibe, ["dark"], c => c.l <= 38));
  }

  return chooseExpandedCandidate(candidates, existing, vibe, "dark");
}

function separateTopRow(palette, vibe, core) {
  let tries = 0;

  while (tries < 10) {
    let changed = false;

    if (topRowTooSimilar(palette[1], palette[2])) {
      palette[2] = makeDistinctNeutralBridge(vibe, core, [palette[0], palette[1]], palette[1]);
      changed = true;
    }

    if (topRowTooSimilar(palette[2], palette[3])) {
      let replacement = warmNudeNeutralForExpanded(vibe, palette.filter((_, i) => i !== 3));
      let innerTries = 0;

      while (
        innerTries < 8 &&
        (topRowTooSimilar(replacement, palette[2]) || topRowTooSimilar(replacement, palette[1]))
      ) {
        replacement = warmNudeNeutralForExpanded(vibe, palette.filter((_, i) => i !== 3));
        innerTries++;
      }

      palette[3] = replacement;
      changed = true;
    }

    if (
      (isWarmNeutral(palette[1]) && isWarmNeutral(palette[2])) ||
      topRowTooSimilar(palette[1], palette[2])
    ) {
      let replacement = makeSoftTintExpansion(vibe, core, [palette[0]]);
      let innerTries = 0;

      while (
        innerTries < 8 &&
        (topRowTooSimilar(replacement, palette[2]) || (isWarmNeutral(replacement) && isWarmNeutral(palette[2])))
      ) {
        replacement = makeSoftTintExpansion(vibe, core, [palette[0]]);
        innerTries++;
      }

      palette[1] = replacement;
      changed = true;
    }

    if (!changed) break;
    tries++;
  }

  return palette.map(copyColor);
}

function scoreExpandedPalette(palette, vibe) {
  let score = 0;

  const families = palette.map(c => hueFamily(c.h));
  const buckets = palette.map(c => broadColorBucket(c));

  for (let i = 0; i < palette.length; i++) {
    for (let j = i + 1; j < palette.length; j++) {
      const a = palette[i];
      const b = palette[j];
      const hd = hueDistance(a.h, b.h);
      const ld = Math.abs(a.l - b.l);
      const sd = Math.abs(a.s - b.s);
      const dist = hd * 0.75 + ld * 1.1 + sd * 0.5;

      if (dist < 24) score -= 400;
      if (hd < 16 && ld < 20) score -= 220;
      if (hueFamily(a.h) === hueFamily(b.h) && ld < 22) score -= 220;
      if (broadColorBucket(a) === broadColorBucket(b) && ld < 14 && sd < 18) score -= 160;
    }
  }

  const familyCounts = {};
  const bucketCounts = {};

  families.forEach(f => familyCounts[f] = (familyCounts[f] || 0) + 1);
  buckets.forEach(b => bucketCounts[b] = (bucketCounts[b] || 0) + 1);

  Object.values(familyCounts).forEach(count => {
    if (count > 2) score -= (count - 2) * 280;
  });

  Object.values(bucketCounts).forEach(count => {
    if (count > 3) score -= (count - 3) * 220;
  });

  const warmCount = palette.filter(c => isWarmHue(c.h) || c.h <= 72).length;
  const coolCount = palette.filter(c => isCoolHue(c.h) || (c.h >= 80 && c.h <= 170)).length;
  const neutralCount = palette.filter(isNeutralish).length;
  const darkCount = palette.filter(c => c.l <= 36).length;
  const lightCount = palette.filter(c => c.l >= 78).length;
  const warmNudeCount = countWarmNudeNeutrals(palette);

  if (warmCount >= 2) score += 120;
  if (coolCount >= 2) score += 120;
  if (neutralCount >= 2) score += 120;
  if (darkCount >= 2) score += 80;
  if (lightCount >= 2) score += 70;

  if (warmCount === 0 || coolCount === 0) score -= 500;
  if (neutralCount < 2) score -= 320;
  if (warmNudeCount < 1) score -= 460;
  if (warmNudeCount >= 1) score += 260;
  if (warmNudeCount >= 2) score += 80;
  if (darkCount < 1) score -= 220;
  if (lightCount < 1) score -= 180;

  /* HARD TOP-ROW RULES */
  const softTint = palette[1];
  const neutralBridge = palette[2];
  const neutralSupport = palette[3];

  if (topRowTooSimilar(softTint, neutralBridge)) score -= 900;
  if (topRowTooSimilar(neutralBridge, neutralSupport)) score -= 520;
  if (topRowTooSimilar(softTint, neutralSupport)) score -= 280;

  if (Math.abs(softTint.l - neutralBridge.l) < 10) score -= 180;
  if (hueFamily(softTint.h) === hueFamily(neutralBridge.h)) score -= 240;

  if (isWarmNeutral(softTint) && isWarmNeutral(neutralBridge)) score -= 360;
  if (isWarmNeutral(neutralBridge) && isWarmNeutral(neutralSupport)) score -= 240;

  if (softTint.l > neutralBridge.l) score += 120;
  else score -= 160;

  if (neutralBridge.l > neutralSupport.l - 4) score += 50;

  if (vibe === "playful") {
    const hasWarmNeutral = palette.some(isWarmNeutral);
    if (hasWarmNeutral) score += 220;
  }

  if (vibe === "cozy") {
    const hasYellowBrown = palette.some(c => c.h >= 38 && c.h <= 72 && c.s >= 8 && c.l >= 40 && c.l <= 76);
    if (hasYellowBrown) score += 150;
  }

  return score;
}

function build10ColorTrial(core, vibe) {
  const [light, bridge, accent, balance, dark] = core.map(copyColor);
  const palette = [];

  palette.push(light);

  let softTint = makeSoftTintExpansion(vibe, core, [light]);
  palette.push(softTint);

  let bridge10 = makeDistinctNeutralBridge(vibe, core, [light, softTint], softTint);
  palette.push(bridge10);

  let neutralSupport = warmNudeNeutralForExpanded(vibe, palette);
  let supportTries = 0;
  while (
    supportTries < 8 &&
    (topRowTooSimilar(neutralSupport, softTint) || topRowTooSimilar(neutralSupport, bridge10))
  ) {
    neutralSupport = warmNudeNeutralForExpanded(vibe, palette);
    supportTries++;
  }
  palette.push(neutralSupport);

  palette.push(accent);

  const needAfterAccent = tempNeedForExpandedPalette(palette);
  palette.push(
    needAfterAccent === "warm"
      ? makeWarmExpansion(vibe, core, palette)
      : needAfterAccent === "cool"
        ? makeCoolExpansion(vibe, core, palette)
        : pick([
            makeWarmExpansion(vibe, core, palette),
            makeCoolExpansion(vibe, core, palette)
          ])
  );

  palette.push(balance);

  const needAfterBalance = tempNeedForExpandedPalette(palette);
  palette.push(
    needAfterBalance === "warm"
      ? makeWarmExpansion(vibe, core, palette)
      : needAfterBalance === "cool"
        ? makeCoolExpansion(vibe, core, palette)
        : makeBridgeAccent(vibe, core, palette)
  );

  palette.push(dark);
  palette.push(makeDarkExpansion(vibe, core, palette));

  if (
    hueFamily(palette[5].h) === hueFamily(palette[7].h) ||
    broadColorBucket(palette[5]) === broadColorBucket(palette[7])
  ) {
    palette[7] = makeBridgeAccent(vibe, core, palette.filter((_, i) => i !== 7));
  }

  if (!hasWarmNudeNeutral(palette)) {
    palette[3] = warmNudeNeutralForExpanded(vibe, palette.filter((_, i) => i !== 3));
  }

  return separateTopRow(palette, vibe, core);
}

function build10ColorPalette(core, vibe) {
  let best = null;
  let bestScore = -999999;

  for (let i = 0; i < 220; i++) {
    const trial = build10ColorTrial(core, vibe);
    const score = scoreExpandedPalette(trial, vibe);

    if (score > bestScore) {
      best = trial;
      bestScore = score;
    }
  }

  return best.map(copyColor);
}

function build20ColorPalette(core, vibe) {
  const first = build10ColorPalette(core, vibe);
  const second = build10ColorPalette(core, vibe);
  const all = first.concat(second);
  const chosen = [];

  all.forEach(candidate => {
    if (chosen.length >= 20) return;

    const tooClose = chosen.some(existing =>
      hueDistance(candidate.h, existing.h) < 14 &&
      Math.abs(candidate.l - existing.l) < 16
    );

    if (!tooClose) chosen.push(copyColor(candidate));
  });

  while (chosen.length < 20) {
    chosen.push(makeBridgeAccent(vibe, core, chosen));
  }

  return chosen.slice(0, 20).map(copyColor);
}
</script>
